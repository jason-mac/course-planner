services:
  api:
    build: .
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=courses;Username=postgres;Password=secret
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: courses
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
